# Nginx reverse proxy configuration
# Terminates SSL, rate-limits requests, proxies to FastAPI on port 8000.
# For production: add SSL certificates at /etc/nginx/certs/

events {
    worker_connections 1024;
}

http {
    # Rate limiting — protect medical AI API from abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        # For production: redirect HTTP to HTTPS
        # return 301 https://$server_name$request_uri;

        # Max upload size for DICOM files (can be large)
        client_max_body_size 500M;

        # API proxy
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;   # Long timeout for model inference
        }

        # Health check — no rate limiting on healthcheck
        location /health {
            proxy_pass http://api/health;
            access_log off;
        }
    }

    # HTTPS server (uncomment for production)
    # server {
    #     listen 443 ssl;
    #     ssl_certificate /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ... same location blocks as above
    # }
}
