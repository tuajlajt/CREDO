[pytest]
addopts = -v --tb=short -p no:warnings
markers =
    requires_weights: skip if MedGemma or MedASR model weights are not downloaded
    requires_network: skip if internet is unavailable (RxNav / PubMed / openFDA)
    slow: takes >30 s (full model inference — run with -m slow to include)
    integration: hits a real external service or loaded model
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s  %(levelname)-8s  %(name)s  %(message)s
log_date_format = %H:%M:%S
