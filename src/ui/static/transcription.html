<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedGemma — Clinical Transcription</title>
  <style>
    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:           #0f1117;
      --surface:      #1a1d27;
      --surface-2:    #22263a;
      --border:       #2e3347;
      --text:         #e8eaf0;
      --text-muted:   #8b90a8;
      --accent:       #4f8ef7;
      --accent-dim:   #1e3a6e;
      --green:        #34c77b;
      --green-dim:    #0d3320;
      --yellow:       #f5c842;
      --yellow-dim:   #3a2e05;
      --red:          #f04f4f;
      --red-dim:      #3a0d0d;
      --radius:       10px;
      --font:         "Inter", system-ui, sans-serif;
      --font-mono:    "JetBrains Mono", "Fira Code", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    header .badge {
      margin-left: auto;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 61px);
    }

    /* ── Left panel — input ─────────────────────────────────────────────── */
    .panel-input {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }
    .section {
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Record button ──────────────────────────────────────────────────── */
    #record-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
    }
    #record-btn:hover { border-color: var(--accent); }
    #record-btn.recording {
      border-color: var(--red);
      background: var(--red-dim);
      color: var(--red);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(240,79,79,0.4); }
      50%      { box-shadow: 0 0 0 8px rgba(240,79,79,0); }
    }
    #record-timer {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
      height: 18px;
    }

    /* ── File upload ────────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
      font-size: 13px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }
    #file-input { display: none; }
    #file-name {
      margin-top: 8px;
      font-size: 12px;
      color: var(--accent);
      min-height: 16px;
      word-break: break-all;
    }

    /* ── Text input ─────────────────────────────────────────────────────── */
    textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      padding: 12px;
      resize: vertical;
      min-height: 110px;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    /* ── Submit button ──────────────────────────────────────────────────── */
    #submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.2px;
    }
    #submit-btn:disabled { opacity: 0.4; cursor: default; }
    #submit-btn:hover:not(:disabled) { opacity: 0.88; }

    /* ── Right panel — output ───────────────────────────────────────────── */
    .panel-output {
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Disclaimer banner ──────────────────────────────────────────────── */
    .disclaimer {
      background: var(--yellow-dim);
      border: 1px solid var(--yellow);
      border-radius: var(--radius);
      padding: 11px 16px;
      font-size: 12px;
      color: var(--yellow);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .disclaimer svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Loading spinner ────────────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cards ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-body { padding: 16px 18px; }

    /* ── Summary bar ────────────────────────────────────────────────────── */
    .summary-bar {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .summary-bar .cc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── SOAP note ──────────────────────────────────────────────────────── */
    .soap-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .soap-section { display: flex; flex-direction: column; gap: 6px; }
    .soap-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
    }
    .soap-text {
      background: var(--surface-2);
      border-radius: 7px;
      padding: 11px 13px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .soap-text .unclear {
      background: var(--yellow-dim);
      color: var(--yellow);
      border-radius: 3px;
      padding: 0 3px;
    }
    .soap-text .not-doc {
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── ICD codes ──────────────────────────────────────────────────────── */
    .icd-list { display: flex; flex-direction: column; gap: 8px; }
    .icd-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 11px 14px;
    }
    .icd-code {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      min-width: 60px;
    }
    .icd-desc { flex: 1; font-size: 13px; line-height: 1.5; }
    .icd-basis { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .confidence-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .conf-high   { background: var(--green-dim);  color: var(--green); }
    .conf-medium { background: var(--yellow-dim); color: var(--yellow); }
    .conf-low    { background: var(--surface);    color: var(--text-muted); border: 1px solid var(--border); }

    /* ── Tag lists ──────────────────────────────────────────────────────── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      color: var(--text);
    }
    .tag.gap-tag {
      border-color: var(--yellow);
      color: var(--yellow);
      background: var(--yellow-dim);
    }

    /* ── Raw transcript ─────────────────────────────────────────────────── */
    .transcript-box {
      background: var(--surface-2);
      border-radius: 7px;
      padding: 13px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.8;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
    }

    /* ── Error state ────────────────────────────────────────────────────── */
    .error-banner {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: var(--red);
      font-size: 13px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* ── Provenance footer ──────────────────────────────────────────────── */
    .provenance {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 4px 0 8px;
    }
    .provenance span { display: flex; align-items: center; gap: 4px; }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; height: auto; }
      .panel-input { border-right: none; border-bottom: 1px solid var(--border); }
      .soap-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <!-- Stethoscope icon -->
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
    <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/>
    <circle cx="20" cy="10" r="2"/>
  </svg>
  <h1>Clinical Transcription</h1>
  <span class="badge">MedASR + MedGemma 1.5</span>
</header>

<main>
  <!-- ── Left: input ────────────────────────────────────────────────── -->
  <div class="panel-input">

    <div class="section">
      <div class="section-title">🎙 Record</div>
      <button id="record-btn" onclick="toggleRecord()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="8"/>
        </svg>
        Start Recording
      </button>
      <div id="record-timer"></div>
    </div>

    <div class="section">
      <div class="section-title">📁 Upload Audio</div>
      <div class="upload-zone" id="drop-zone"
           onclick="document.getElementById('file-input').click()"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)">
        Click or drag &amp; drop<br/>
        <small>WAV · MP3 · M4A · OGG · FLAC · WebM</small>
      </div>
      <input type="file" id="file-input" accept="audio/*"
             onchange="onFileSelect(event)" />
      <div id="file-name"></div>
    </div>

    <div class="section">
      <div class="section-title">📝 Paste Transcript</div>
      <textarea id="text-input"
        placeholder="Or paste a raw clinical dictation here…"
        rows="5"></textarea>
    </div>

    <div class="section">
      <button id="submit-btn" onclick="submit()" disabled>
        Generate Structured Note
      </button>
    </div>

  </div>

  <!-- ── Right: output ──────────────────────────────────────────────── -->
  <div class="panel-output" id="output-panel">
    <div style="color:var(--text-muted);font-size:13px;padding:30px 0 0;">
      Record, upload, or paste a clinical dictation to get started.
    </div>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let mediaRecorder = null;
let audioChunks = [];
let recordingBlob = null;
let uploadedFile = null;
let timerInterval = null;
let recordSeconds = 0;

// ── Recording ─────────────────────────────────────────────────────────────────
async function toggleRecord() {
  const btn = document.getElementById('record-btn');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      recordingBlob = new Blob(audioChunks, { type: 'audio/webm' });
      uploadedFile = null;
      setFileName('Recording (' + fmtTime(recordSeconds) + ')');
      enableSubmit();
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
      <rect x="4" y="4" width="16" height="16" rx="2"/></svg> Stop Recording`;
    recordSeconds = 0;
    timerInterval = setInterval(() => {
      recordSeconds++;
      document.getElementById('record-timer').textContent = fmtTime(recordSeconds);
    }, 1000);
  } catch (e) {
    alert('Microphone access denied: ' + e.message);
  }
}

function stopRecordingUI() {
  const btn = document.getElementById('record-btn');
  btn.classList.remove('recording');
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
    <circle cx="12" cy="12" r="8"/></svg> Start Recording`;
  clearInterval(timerInterval);
  document.getElementById('record-timer').textContent = '';
}

// Intercept onstop to also update UI
document.addEventListener('DOMContentLoaded', () => {
  const origToggle = window.toggleRecord;
  window.toggleRecord = async function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecordingUI();
    }
    await origToggle();
  };
});

function fmtTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// ── File upload ───────────────────────────────────────────────────────────────
function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  uploadedFile = file;
  recordingBlob = null;
  setFileName(file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)');
  enableSubmit();
}
function onDragOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); }
function onDragLeave()  { document.getElementById('drop-zone').classList.remove('dragover'); }
function onDrop(e) {
  e.preventDefault();
  onDragLeave();
  const file = e.dataTransfer.files[0];
  if (file) { uploadedFile = file; recordingBlob = null; setFileName(file.name); enableSubmit(); }
}

function setFileName(name) {
  document.getElementById('file-name').textContent = '✓ ' + name;
}

// ── Text input ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('text-input').addEventListener('input', function() {
    if (this.value.trim().length > 0) enableSubmit();
    else if (!recordingBlob && !uploadedFile) disableSubmit();
  });
});

function enableSubmit()  { document.getElementById('submit-btn').disabled = false; }
function disableSubmit() { document.getElementById('submit-btn').disabled = true; }

// ── Submit ────────────────────────────────────────────────────────────────────
async function submit() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showLoading();

  try {
    let result;
    const textInput = document.getElementById('text-input').value.trim();

    if (recordingBlob || uploadedFile) {
      // Audio path
      const formData = new FormData();
      if (recordingBlob) {
        formData.append('file', recordingBlob, 'recording.webm');
      } else {
        formData.append('file', uploadedFile, uploadedFile.name);
      }
      formData.append('note_type', 'soap');

      const resp = await fetch('/transcribe/audio', { method: 'POST', body: formData });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      result = await resp.json();

    } else if (textInput) {
      // Text path
      const formData = new FormData();
      formData.append('transcript', textInput);
      formData.append('note_type', 'soap');

      const resp = await fetch('/transcribe/text', { method: 'POST', body: formData });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      result = await resp.json();
    } else {
      throw new Error('Please record, upload, or paste a transcript first.');
    }

    renderResult(result);
  } catch (e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('output-panel').innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span>Transcribing and structuring note… this may take 30–90 seconds.</span>
    </div>`;
}

function showError(msg) {
  document.getElementById('output-panel').innerHTML = `
    <div class="error-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div><strong>Error</strong><br/>${escHtml(msg)}</div>
    </div>`;
}

function renderResult(r) {
  const panel = document.getElementById('output-panel');
  const parts = [];

  // Disclaimer
  parts.push(`
    <div class="disclaimer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>${escHtml(r.disclaimer || 'AI-generated — requires clinician review before use.')}</span>
    </div>`);

  // Summary + Chief Complaint
  if (r.summary || r.chief_complaint) {
    parts.push(`
      <div class="summary-bar">
        ${r.chief_complaint ? `<div class="cc">Chief Complaint</div><div style="font-weight:600;margin-bottom:6px">${escHtml(r.chief_complaint)}</div>` : ''}
        ${r.summary ? `<div style="color:var(--text-muted);font-size:13px">${escHtml(r.summary)}</div>` : ''}
      </div>`);
  }

  // SOAP note
  const s = r.soap || {};
  parts.push(`
    <div class="card">
      <div class="card-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        SOAP Note
      </div>
      <div class="card-body">
        <div class="soap-grid">
          ${soapSection('S — Subjective', s.subjective)}
          ${soapSection('O — Objective', s.objective)}
          ${soapSection('A — Assessment', s.assessment)}
          ${soapSection('P — Plan', s.plan)}
        </div>
      </div>
    </div>`);

  // ICD codes
  if (r.icd_codes && r.icd_codes.length > 0) {
    const items = r.icd_codes.map(c => `
      <div class="icd-item">
        <div class="icd-code">${escHtml(c.code)}</div>
        <div class="icd-desc">
          ${escHtml(c.description)}
          ${c.basis ? `<div class="icd-basis">${escHtml(c.basis)}</div>` : ''}
        </div>
        <span class="confidence-badge conf-${c.confidence || 'low'}">${c.confidence || 'low'}</span>
      </div>`).join('');
    parts.push(`
      <div class="card">
        <div class="card-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          ICD-10 Code Suggestions
        </div>
        <div class="card-body"><div class="icd-list">${items}</div></div>
      </div>`);
  }

  // Medications
  if (r.medications_mentioned && r.medications_mentioned.length > 0) {
    const tags = r.medications_mentioned.map(m => `<span class="tag">${escHtml(m)}</span>`).join('');
    parts.push(`
      <div class="card">
        <div class="card-header">💊 Medications Mentioned</div>
        <div class="card-body"><div class="tag-list">${tags}</div></div>
      </div>`);
  }

  // Documentation gaps
  if (r.documentation_gaps && r.documentation_gaps.length > 0) {
    const gaps = r.documentation_gaps.map(g => `<span class="tag gap-tag">${escHtml(g)}</span>`).join('');
    parts.push(`
      <div class="card">
        <div class="card-header">⚠ Documentation Gaps</div>
        <div class="card-body"><div class="tag-list">${gaps}</div></div>
      </div>`);
  }

  // Raw transcript (collapsible)
  if (r.raw_transcript && r.asr_model !== 'none') {
    parts.push(`
      <div class="card">
        <div class="card-header" style="cursor:pointer" onclick="toggleTranscript()">
          🎙 Raw Transcript &nbsp;<span id="transcript-toggle" style="font-weight:400;font-size:10px">show</span>
        </div>
        <div class="card-body" id="transcript-body" style="display:none">
          <div class="transcript-box">${escHtml(r.raw_transcript)}</div>
        </div>
      </div>`);
  }

  // Provenance
  parts.push(`
    <div class="provenance">
      <span>🤖 ASR: ${escHtml(r.asr_model || '—')}</span>
      <span>🧠 LLM: ${escHtml(r.llm_model || '—')}</span>
      <span>🕐 ${new Date(r.generated_at).toLocaleString()}</span>
    </div>`);

  panel.innerHTML = parts.join('');
}

function soapSection(label, text) {
  const isEmpty = !text || text === '[not documented]';
  const content = isEmpty
    ? '<span class="not-doc">[not documented]</span>'
    : escHtml(text)
        .replace(/\[unclear:[^\]]*\]/g, m => `<span class="unclear">${m}</span>`)
        .replace(/\[not documented\]/g, '<span class="not-doc">[not documented]</span>');
  return `
    <div class="soap-section">
      <div class="soap-label">${label}</div>
      <div class="soap-text">${content}</div>
    </div>`;
}

function toggleTranscript() {
  const body = document.getElementById('transcript-body');
  const lbl  = document.getElementById('transcript-toggle');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? 'block' : 'none';
  lbl.textContent = hidden ? 'hide' : 'show';
}

function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
